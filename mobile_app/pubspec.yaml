name: im_app
description: "CE313 Instant Messaging App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_fonts: ^6.2.1
  uuid: ^4.5.1
  sqflite: ^2.4.2
  path: ^1.9.1
  shared_preferences: ^2.3.5
  multiavatar: ^0.1.5
  flutter_svg: ^2.0.17
  lottie: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
